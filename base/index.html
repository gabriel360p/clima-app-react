<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <header>
      <h1> React Clima 🌤️</h1>
      <div class="search-box">
        <input type="text" placeholder="Digite uma cidade..." id="cityInput">
        <button onclick="buscarClima()">Buscar</button>
      </div>
    </header>

    <main id="weatherContainer" class="hidden">
      <h2 id="cityName">São Paulo</h2>

      <div class="weather-info">
        <div class="temp" id="temperature">25°C</div>
        <div class="description" id="description">Ensolarado</div>
      </div>

      <div class="details">
        <div>
          <span>💧 Umidade</span>
          <p id="humidity">70%</p>
        </div>

        <div>
          <span>🌬️ Vento</span>
          <p id="wind">10 km/h</p>
        </div>
      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
